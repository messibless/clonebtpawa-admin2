name: Deploy Vue Admin2 App to Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4  

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4  
        with:
          node-version: '22'  
          cache: 'npm'

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Build Vue App
      - name: Build App
        run: npm run build

      # 5️⃣ Deploy to Server via Rsync (COPY CONTENTS ONLY)
      - name: Deploy to Server via Rsync
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete
          path: dist/*                # 🔥 COPY CONTENTS of dist, NOT the dist folder itself
          remote_path: /var/www/betpawa-admin2/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}